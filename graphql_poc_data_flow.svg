<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;max-width:1100px;">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#16a34a"/>
  </marker>
  <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#7c3aed"/>
  </marker>
  <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#9ca3af"/>
  </marker>
  <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/></filter>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f8fafc"/>
    <stop offset="100%" stop-color="#f1f5f9"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1100" height="720" rx="16" fill="url(#bgGrad)"/>

<!-- Title -->
<text x="550" y="40" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="20" fill="#1e293b" font-weight="700">GraphQL POC — Data Flow</text>
<text x="550" y="62" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" fill="#64748b">How a GraphQL query travels from client to database and back</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 1: Test Client (Postman) -->
<!-- ══════════════════════════════════════ -->
<rect x="60" y="95" width="220" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="170" y="125" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#3b82f6" font-weight="600" letter-spacing="1">TEST CLIENT</text>
<text x="170" y="150" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#1e40af" font-weight="700">Postman</text>
<text x="170" y="172" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">GraphQL query</text>

<!-- Step number 1 -->
<circle cx="60" cy="95" r="14" fill="#3b82f6"/>
<text x="60" y="100" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">1</text>

<!-- Arrow 1→2 -->
<line x1="280" y1="145" x2="378" y2="145" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="330" y="135" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#3b82f6">POST</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 2: Apollo Router -->
<!-- ══════════════════════════════════════ -->
<rect x="390" y="85" width="310" height="120" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="545" y="115" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#7c3aed" font-weight="600" letter-spacing="1">GRAPHQL GATEWAY</text>
<text x="545" y="142" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#5b21b6" font-weight="700">Apollo Router</text>
<text x="545" y="162" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">:4000 (Docker)</text>
<text x="545" y="182" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#8b5cf6">Validates, routes, merges responses</text>

<!-- Step number 2 -->
<circle cx="390" cy="85" r="14" fill="#7c3aed"/>
<text x="390" y="90" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">2</text>

<!-- Arrow 2→3 -->
<line x1="700" y1="145" x2="798" y2="145" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
<text x="750" y="135" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#7c3aed">route</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 3: Spring Boot Subgraph -->
<!-- ══════════════════════════════════════ -->
<rect x="810" y="85" width="240" height="120" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="930" y="115" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#16a34a" font-weight="600" letter-spacing="1">SUBGRAPH</text>
<text x="930" y="142" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#15803d" font-weight="700">Spring Boot</text>
<text x="930" y="162" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">:8081 (Host)</text>
<text x="930" y="182" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#16a34a">Resolvers, Services, JPA</text>

<!-- Step number 3 -->
<circle cx="810" cy="85" r="14" fill="#16a34a"/>
<text x="810" y="90" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">3</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 4: Databases -->
<!-- ══════════════════════════════════════ -->
<!-- Arrow 3→DB1 -->
<line x1="880" y1="205" x2="880" y2="278" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
<text x="895" y="250" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#16a34a">SQL</text>

<!-- Arrow 3→DB2 -->
<line x1="980" y1="205" x2="980" y2="278" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
<text x="995" y="250" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#16a34a">SQL</text>

<!-- DB1 -->
<rect x="790" y="290" width="170" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="875" y="320" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#b45309" font-weight="700">PostgreSQL</text>
<text x="875" y="340" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#92400e">deposit_accounts</text>
<text x="875" y="360" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#64748b">:5432 (Docker)</text>

<!-- DB2 -->
<rect x="790" y="400" width="170" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="875" y="430" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#b45309" font-weight="700">PostgreSQL</text>
<text x="875" y="450" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#92400e">deposit_transactions</text>
<text x="875" y="470" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#64748b">:5433 (Docker)</text>

<!-- Step number 4 -->
<circle cx="790" cy="290" r="14" fill="#f59e0b"/>
<text x="790" y="295" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">4</text>

<!-- ══════════════════════════════════════ -->
<!-- Apollo Studio (optional, dashed) -->
<!-- ══════════════════════════════════════ -->
<rect x="390" y="255" width="310" height="70" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
<text x="545" y="283" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" fill="#ea580c" font-weight="600">Apollo Studio</text>
<text x="545" y="303" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#9a3412">Cloud schema explorer (optional)</text>

<!-- Dashed arrow Studio↔Router -->
<line x1="545" y1="255" x2="545" y2="210" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-gray)"/>

<!-- ══════════════════════════════════════ -->
<!-- Rover CLI (schema tooling) -->
<!-- ══════════════════════════════════════ -->
<rect x="60" y="255" width="240" height="70" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
<text x="180" y="283" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" fill="#7c3aed" font-weight="600">Rover CLI</text>
<text x="180" y="303" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#6d28d9">Composes supergraph schema</text>

<!-- Dashed arrows Rover→Subgraph and Rover→Router -->
<path d="M 300 280 Q 550 260 810 150" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-gray)"/>
<line x1="180" y1="255" x2="440" y2="210" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-gray)"/>

<!-- ══════════════════════════════════════ -->
<!-- DETAIL: Inside Spring Boot Subgraph -->
<!-- ══════════════════════════════════════ -->
<rect x="60" y="420" width="680" height="280" rx="14" fill="white" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="452" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#1e293b" font-weight="700">Inside the Spring Boot Subgraph</text>
<line x1="70" y1="462" x2="730" y2="462" stroke="#e5e7eb" stroke-width="1"/>

<!-- GraphQL Schema -->
<rect x="85" y="480" width="140" height="55" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="155" y="503" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#1e40af" font-weight="600">schema.graphqls</text>
<text x="155" y="520" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#3b82f6">Query { hello }</text>

<!-- Arrow schema→resolver -->
<line x1="225" y1="507" x2="258" y2="507" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Resolver -->
<rect x="270" y="480" width="140" height="55" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text x="340" y="503" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#15803d" font-weight="600">HelloResolver</text>
<text x="340" y="520" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#16a34a">@QueryMapping</text>

<!-- Arrow resolver→repo -->
<line x1="410" y1="507" x2="448" y2="507" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- Repository -->
<rect x="460" y="480" width="140" height="55" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="530" y="503" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#5b21b6" font-weight="600">HelloRepository</text>
<text x="530" y="520" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#7c3aed">Spring Data JPA</text>

<!-- Arrow repo→entity -->
<line x1="530" y1="535" x2="530" y2="563" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- Entity -->
<rect x="460" y="575" width="140" height="55" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
<text x="530" y="598" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#b45309" font-weight="600">Hello (Entity)</text>
<text x="530" y="615" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#92400e">@Table("hello")</text>

<!-- Arrow entity→DB -->
<line x1="600" y1="602" x2="690" y2="602" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="690" y="598" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#92400e">→ DB</text>

<!-- Flow labels at bottom -->
<rect x="85" y="650" width="640" height="35" rx="6" fill="#f1f5f9"/>
<text x="405" y="672" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#475569">
  Request: schema.graphqls → HelloResolver → HelloRepository → Hello entity → PostgreSQL
</text>

</svg>
