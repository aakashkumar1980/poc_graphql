<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;max-width:1100px;">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#16a34a"/>
  </marker>
  <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#7c3aed"/>
  </marker>
  <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/>
  </marker>
  <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#9ca3af"/>
  </marker>
  <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/></filter>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f8fafc"/>
    <stop offset="100%" stop-color="#f1f5f9"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1100" height="720" rx="16" fill="url(#bgGrad)"/>

<!-- Title -->
<text x="550" y="40" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="20" fill="#1e293b" font-weight="700">GraphQL POC — Data Flow</text>
<text x="550" y="62" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" fill="#64748b">How a GraphQL query travels from client to database and back</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 1: Test Client (Postman) -->
<!-- ══════════════════════════════════════ -->
<rect x="40" y="95" width="200" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="140" y="125" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#3b82f6" font-weight="600" letter-spacing="1">TEST CLIENT</text>
<text x="140" y="150" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#1e40af" font-weight="700">Postman</text>
<text x="140" y="172" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">GraphQL query</text>

<!-- Step number 1 -->
<circle cx="40" cy="95" r="14" fill="#3b82f6"/>
<text x="40" y="100" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">1</text>

<!-- Arrow 1→2 -->
<line x1="240" y1="145" x2="308" y2="145" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="275" y="135" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#3b82f6">POST</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 2: Apollo Router -->
<!-- ══════════════════════════════════════ -->
<rect x="320" y="85" width="240" height="120" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="440" y="115" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#7c3aed" font-weight="600" letter-spacing="1">GRAPHQL GATEWAY</text>
<text x="440" y="142" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#5b21b6" font-weight="700">Apollo Router</text>
<text x="440" y="162" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">:4000 (Docker)</text>
<text x="440" y="182" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#8b5cf6">Validates, routes, merges responses</text>

<!-- Step number 2 -->
<circle cx="320" cy="85" r="14" fill="#7c3aed"/>
<text x="320" y="90" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">2</text>

<!-- Arrow 2→3 -->
<line x1="560" y1="145" x2="628" y2="145" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
<text x="595" y="135" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#7c3aed">route</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 3: Spring Boot Subgraph -->
<!-- ══════════════════════════════════════ -->
<rect x="640" y="85" width="220" height="120" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="750" y="115" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#16a34a" font-weight="600" letter-spacing="1">SUBGRAPH</text>
<text x="750" y="142" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#15803d" font-weight="700">Spring Boot</text>
<text x="750" y="162" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">:8081 (Host)</text>
<text x="750" y="182" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#16a34a">Resolvers, Services, JPA</text>

<!-- Step number 3 -->
<circle cx="640" cy="85" r="14" fill="#16a34a"/>
<text x="640" y="90" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">3</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 4: Databases (side by side) -->
<!-- ══════════════════════════════════════ -->

<!-- Arrow 3→DB1 -->
<line x1="700" y1="205" x2="700" y2="268" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
<text x="685" y="245" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#16a34a">SQL</text>

<!-- Arrow 3→DB2 -->
<line x1="800" y1="205" x2="800" y2="268" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
<text x="815" y="245" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#16a34a">SQL</text>

<!-- DB1 (left) -->
<rect x="610" y="280" width="180" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="700" y="308" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#b45309" font-weight="700">PostgreSQL</text>
<text x="700" y="328" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#92400e">deposit_accounts</text>
<text x="700" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#64748b">:5432 · accounts, balances</text>

<!-- DB2 (right) -->
<rect x="810" y="280" width="180" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="900" y="308" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#b45309" font-weight="700">PostgreSQL</text>
<text x="900" y="328" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#92400e">deposit_transactions</text>
<text x="900" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#64748b">:5433 · transactions</text>

<!-- Step number 4 -->
<circle cx="610" cy="280" r="14" fill="#f59e0b"/>
<text x="610" y="285" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="white" font-weight="700">4</text>

<!-- ══════════════════════════════════════ -->
<!-- Apollo Studio (optional, dashed) -->
<!-- ══════════════════════════════════════ -->
<rect x="40" y="240" width="220" height="60" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
<text x="150" y="265" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" fill="#ea580c" font-weight="600">Apollo Studio</text>
<text x="150" y="283" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#9a3412">Cloud schema explorer (optional)</text>

<!-- Dashed arrow Studio→Router -->
<path d="M 260 260 Q 310 230 320 200" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-gray)"/>

<!-- ══════════════════════════════════════ -->
<!-- DETAIL: Inside Spring Boot Subgraph -->
<!-- ══════════════════════════════════════ -->
<rect x="40" y="400" width="1020" height="300" rx="14" fill="white" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="550" y="432" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#1e293b" font-weight="700">Inside the Spring Boot Subgraph</text>
<line x1="50" y1="442" x2="1050" y2="442" stroke="#e5e7eb" stroke-width="1"/>

<!-- GraphQL Schema -->
<rect x="65" y="470" width="150" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="140" y="495" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#1e40af" font-weight="600">schema.graphqls</text>
<text x="140" y="515" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#3b82f6">getAccount(id)</text>

<!-- Arrow schema→resolver -->
<line x1="215" y1="500" x2="253" y2="500" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Resolver -->
<rect x="265" y="470" width="155" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text x="342" y="495" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#15803d" font-weight="600">AccountResolver</text>
<text x="342" y="515" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#16a34a">@QueryMapping</text>

<!-- Arrow resolver→service -->
<line x1="420" y1="500" x2="458" y2="500" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- Service -->
<rect x="470" y="470" width="155" height="60" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
<text x="547" y="495" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#047857" font-weight="600">AccountService</text>
<text x="547" y="515" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#059669">@Service</text>

<!-- Arrow service→repo -->
<line x1="625" y1="500" x2="663" y2="500" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- Repository -->
<rect x="675" y="470" width="155" height="60" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="752" y="495" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#5b21b6" font-weight="600">AccountRepository</text>
<text x="752" y="515" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#7c3aed">Spring Data JPA</text>

<!-- Arrow repo→entity -->
<line x1="830" y1="500" x2="868" y2="500" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- Entity -->
<rect x="880" y="470" width="155" height="60" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
<text x="957" y="495" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#b45309" font-weight="600">Account (Entity)</text>
<text x="957" y="515" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#92400e">@Table("accounts")</text>

<!-- Flow labels at bottom -->
<rect x="65" y="560" width="970" height="55" rx="6" fill="#f1f5f9"/>
<text x="550" y="580" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#475569">
  schema.graphqls → AccountResolver → AccountService → AccountRepository → Account entity → PostgreSQL
</text>

<!-- Sample query & response -->
<text x="200" y="600" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#64748b">Query:</text>
<text x="250" y="600" font-family="JetBrains Mono,Consolas,monospace" font-size="10" fill="#1e40af">{ getAccount(id: "ACT-234") { accountNumber balance { available } transactions { description amount } } }</text>

<!-- Legend at bottom -->
<rect x="65" y="640" width="970" height="40" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
<circle cx="100" cy="660" r="6" fill="#3b82f6"/>
<text x="115" y="664" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#475569">Host (native)</text>
<circle cx="230" cy="660" r="6" fill="#7c3aed"/>
<text x="245" y="664" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#475569">Docker container</text>
<circle cx="380" cy="660" r="6" fill="#f59e0b"/>
<text x="395" y="664" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#475569">Database (Docker)</text>
<rect x="520" y="654" width="20" height="0" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 2"/>
<line x1="520" y1="660" x2="540" y2="660" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="550" y="664" font-family="Inter,Segoe UI,sans-serif" font-size="10" fill="#475569">Optional / dev-time tooling</text>

</svg>
