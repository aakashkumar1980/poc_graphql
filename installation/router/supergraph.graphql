# ============================================
# Supergraph Schema (Placeholder)
# ============================================
# This file will be generated by Rover CLI once the
# Spring Boot subgraph is running. For now, this is a
# minimal passthrough schema so the Router can start.
#
# To regenerate, run: ./scripts/compose-supergraph.sh
# ============================================

schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION)
{
  query: Query
  mutation: Mutation
}

directive @join__graph(name: String!, url: String!) on ENUM_VALUE
directive @join__type(graph: join__Graph!, key: join__FieldSet) repeatable on OBJECT | INTERFACE
directive @join__field(graph: join__Graph) on FIELD_DEFINITION
directive @link(url: String!, for: link__Purpose) repeatable on SCHEMA

scalar join__FieldSet
enum link__Purpose { SECURITY EXECUTION }

enum join__Graph {
  DEPOSIT @join__graph(name: "deposit", url: "http://host.docker.internal:8081/graphql")
}

type Query {
  account(id: String!): Account @join__field(graph: DEPOSIT)
}

type Mutation {
  openDispute(transactionId: String!, reason: String!): DisputeCase @join__field(graph: DEPOSIT)
}

type Account @join__type(graph: DEPOSIT, key: "id") {
  id: String!
  accountNumber: String!
  status: String!
  balance: Balance
  transactions(first: Int): [Transaction!]!
}

type Balance {
  available: Float!
  current: Float!
  currency: String!
}

type Transaction {
  id: String!
  amount: Float!
  description: String!
  merchant: String
  txnDate: String!
}

type DisputeCase {
  disputeId: String!
  status: String!
  estimatedResolutionDate: String
  provisionedAmount: Float
}
